<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>QS Survey Mode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/sections.css">
  <link rel="stylesheet" href="css/sections-active-quiz.css">
</head>
<body class="arena-body">

<!-- FIREBASE SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="js/firebase-config.js"></script>

<div class="portal-overlay active" id="portal-flow-overlay" style="display: flex;">
  <div class="portal-modal" style="width: 100%; max-width: 500px;">
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
      <a href="index.html" style="background: rgba(255,255,255,0.1); backdrop-filter: blur(4px); color: var(--primary); border: none; font-size: 1.25rem; font-weight: 800; cursor: pointer; text-decoration: none;">
        <img src="qs_logo.png" alt="" style="height:24px; vertical-align:middle; margin-right:8px;">QS
      </a>
    </div>

    <div class="portal-card" style="box-shadow: none; border: 1px solid var(--section-divider);">
      
      <!-- Step 1: Join Survey -->
      <div id="survey-step-join" class="portal-step active">
        <h3 style="font-size: 1.75rem; margin-bottom: 8px;">Join Survey</h3>
        <p style="color: var(--text-secondary); margin-bottom: 24px;">Enter the 6-digit code provided by the presenter.</p>
        
        <div class="fg">
          <label>Your Name</label>
          <input type="text" id="inp-survey-name" placeholder="Enter your name" style="padding: 14px; font-size: 1rem; border-radius: 12px; border: 1px solid var(--section-divider); outline: none; background: #f8fafc;">
        </div>
        
        <div class="fg">
          <label>Survey Code</label>
          <input type="number" id="inp-survey-code" placeholder="123456" style="padding: 14px; font-size: 1.25rem; letter-spacing: 2px; border-radius: 12px; border: 1px solid var(--section-divider); outline: none; background: #f8fafc; font-weight: 700; text-align: center;">
        </div>
        
        <p class="err" id="survey-join-err" style="margin-bottom:16px; color:#ef4444; font-size:0.9rem; display:none;"></p>
        
        <button id="btn-survey-join" class="btn-sky" style="width: 100%; padding: 14px; font-size: 1.1rem; border-radius: 12px;">Join Survey</button>
      </div>

      <!-- Step 2: Lobby (Waiting for Slide) -->
      <div id="survey-step-lobby" class="portal-step" style="display: none; text-align: center; padding: 40px 20px;">
        <h4 style="font-size: 1.5rem; margin-bottom: 16px; font-weight: 800; color: var(--primary);">You're In!</h4>
        <p style="color: var(--text-secondary); margin-bottom: 32px; font-size: 1.1rem;">Waiting for the presenter to show the next slide...</p>
        <div class="loader" style="margin: 0 auto;"></div>
      </div>

      <!-- Step 3: Active Slide -->
      <div id="survey-step-active" class="portal-step" style="display: none; text-align: center;">
        <h3 id="survey-slide-question" style="font-size: 1.5rem; font-weight: 800; margin-bottom: 24px; line-height: 1.3;">Question?</h3>
        
        <!-- Interactive Area -->
        <div id="survey-interactive-area" style="display: flex; flex-direction: column; gap: 12px;">
          <!-- Content injected by JS based on slide type -->
        </div>

        <div id="survey-submitted-msg" style="display: none; margin-top: 24px; padding: 16px; background: #ecfdf5; border: 1px solid #10b981; border-radius: 12px; color: #047857; font-weight: 600;">
          Response submitted! Wait for the next slide.
        </div>
      </div>

    </div>
  </div>
</div>

<style>
  .loader {
    width: 48px;
    height: 48px;
    border: 5px solid #f3f4f6;
    border-bottom-color: #0ea5e9;
    border-radius: 50%;
    display: inline-block;
    box-sizing: border-box;
    animation: rotation 1s linear infinite;
  }
  @keyframes rotation {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
</style>

<script src="js/survey.js?v=1"></script>
</body>
</html>
